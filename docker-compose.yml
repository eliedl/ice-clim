name: ice-clim

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: cis-archive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

# ── First-run behaviour ───────────────────────────────────────────────────────
#
#   On first `docker compose up` (empty volume):
#     Compose creates the `pgdata` volume automatically, then
#     backend/initdb/00_create_tables.sql runs via the docker-entrypoint-initdb.d
#     mechanism — creating an empty schema only. Mounting the directory shadows
#     the image's default 10_postgis.sh, so only the `postgis` extension is loaded
#     (no topology/tiger/fuzzystrmatch, no template_postgis db) — minimal install.
#     Populate it from the host with: python backend/ingestion/main.py
#     (see backend/QUICKSTART.md).
#
#   On subsequent `docker compose up` (volume has data):
#     The initdb script does NOT run. Existing data is preserved.
#
#   To reset everything: docker compose down -v
#     WARNING: `-v` deletes the compose-managed `pgdata` volume and the entire
#     ingested DB with it. A full re-ingest is required afterwards.
