name: ice-clim

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: cis-archive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - /home/eliedl/data/backup:/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    external: true
    name: ice-clim_pgdata

# ── First-run behaviour ───────────────────────────────────────────────────────
#
#   On first `docker compose up` (empty volume):
#     initdb/00_init.sh runs automatically (docker-entrypoint-initdb.d mechanism).
#     If /home/eliedl/data/backup/CIS_historical_db.dump exists and sgrda is
#     empty → pg_restore (30–60 min).
#     Otherwise → empty schema is created; run scripts/populate_cis_historical_db.py
#     manually to ingest from raw archives (~4–8 hrs).
#
#   On subsequent `docker compose up` (volume has data):
#     initdb/00_init.sh does NOT run. Existing data is preserved.
#
#   To reset everything: docker compose down -v
#
# ── Creating a backup dump ───────────────────────────────────────────────────
#
#   After a full ingest, run:
#     pg_dump -Fc -h localhost -p ${POSTGRES_PORT} -U ${POSTGRES_USER} \
#       -d ${POSTGRES_DB} -f /home/eliedl/data/backup/CIS_historical_db.dump
#   Then upload CIS_historical_db.dump to Google Drive alongside raw archives.
